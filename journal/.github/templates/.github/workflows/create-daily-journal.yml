name: Create daily journal

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  create-journal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get day number
        id: get_day
        run: |
          # Считаем сколько уже есть файлов в journal
          if [ -d "journal" ]; then
            COUNT=$(ls journal/day-*.md 2>/dev/null | wc -l)
          else
            COUNT=0
          fi
          DAY_NUMBER=$((COUNT + 1))
          echo "day_number=$DAY_NUMBER" >> $GITHUB_OUTPUT
          echo "date=$(date '+%d.%m.%Y')" >> $GITHUB_OUTPUT

      - name: Create journal file
        run: |
          mkdir -p journal
          # Копируем шаблон и заменяем переменные
          sed "s/{{DAY_NUMBER}}/${{ steps.get_day.outputs.day_number }}/g; s/{{DATE}}/${{ steps.get_day.outputs.date }}/g" .github/templates/day-template.md > journal/day-${{ steps.get_day.outputs.day_number }}.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add journal/
          git commit -m "Auto: create day ${{ steps.get_day.outputs.day_number }} journal" || echo "No changes to commit"
          git push
