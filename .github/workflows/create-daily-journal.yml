name: Create daily journal

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  create-journal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get day number
        id: get_day
        run: |
          mkdir -p journal
          if ls journal/day-*.md 1> /dev/null 2>&1; then
            COUNT=$(ls journal/day-*.md | wc -l)
          else
            COUNT=0
          fi
          DAY_NUMBER=$((COUNT + 1))
          echo "day_number=$DAY_NUMBER" >> $GITHUB_OUTPUT
          echo "date=$(date '+%d.%m.%Y')" >> $GITHUB_OUTPUT

      - name: Create journal file
        run: |
          DAY_NUMBER="${{ steps.get_day.outputs.day_number }}"
          DATE="${{ steps.get_day.outputs.date }}"
          FILE="journal/day-${DAY_NUMBER}.md"
          
          printf "# День %s — %s\n\n" "$DAY_NUMBER" "$DATE" > "$FILE"
          printf "## Что сделал\n\n\n" >> "$FILE"
          printf "## Что узнал\n\n\n" >> "$FILE"
          printf "## Проблемы\n\n\n" >> "$FILE"
          printf "## Код\ncode/day%s.py\n" "$DAY_NUMBER" >> "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add journal/
          git diff --cached --quiet || git commit -m "Auto: create day ${{ steps.get_day.outputs.day_number }} journal"
          git push
