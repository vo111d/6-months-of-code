name: Create daily journal

on:
  workflow_dispatch:

jobs:
  create-journal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create journal file
        run: |
          mkdir -p journal
          COUNT=$(ls journal/day-*.md 2>/dev/null | wc -l)
          DAY=$((COUNT + 1))
          FILE="journal/day-${DAY}.md"
          
          echo "# День ${DAY}" > "$FILE"
          echo "" >> "$FILE"
          echo "## Что сделал" >> "$FILE"
          echo "" >> "$FILE"
          echo "## Что узнал" >> "$FILE"
          echo "" >> "$FILE"
          echo "## Проблемы" >> "$FILE"
          echo "" >> "$FILE"
          echo "## Код" >> "$FILE"
          echo "code/day${DAY}.py" >> "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add journal/
          git commit -m "Create day ${DAY} journal" || echo "No changes"
          git push
