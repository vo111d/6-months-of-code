name: Create daily journal

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  create-journal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get day number
        id: get_day
        run: |
          mkdir -p journal
          if ls journal/day-*.md 1> /dev/null 2>&1; then
            COUNT=$(ls journal/day-*.md | wc -l)
          else
            COUNT=0
          fi
          DAY_NUMBER=$((COUNT + 1))
          echo "day_number=$DAY_NUMBER" >> $GITHUB_OUTPUT
          echo "date=$(date '+%d.%m.%Y')" >> $GITHUB_OUTPUT

      - name: Create journal file
        run: |
          DAY_NUMBER=${{ steps.get_day.outputs.day_number }}
          DATE="${{ steps.get_day.outputs.date }}"
          FILE="journal/day-${DAY_NUMBER}.md"
          
          echo "# День ${DAY_NUMBER} — ${DATE}" > "$FILE"
          echo "" >> "$FILE"
          echo "## Что сделал" >> "$FILE"
          echo "" >> "$FILE"
          echo "" >> "$FILE"
          echo "## Что узнал" >> "$FILE"
          echo "" >> "$FILE"
          echo "" >> "$FILE"
          echo "## Проблемы" >> "$FILE"
          echo "" >> "$FILE"
          echo "" >> "$FILE"
          echo "## Код" >> "$FILE"
          echo "code/day${DAY_NUMBER}.py" >> "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add journal/
          git diff --cached --quiet || git commit -m "Auto: create day ${{ steps.get_day.outputs.day_number }} journal"
          git push
