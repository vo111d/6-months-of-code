name: Create daily journal

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  create-journal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create journal file
        run: |
          mkdir -p journal
          DAY_NUMBER=$(ls journal/day-*.md 2>/dev/null | wc -l)
          DAY_NUMBER=$((DAY_NUMBER + 1))
          DATE=$(date '+%d.%m.%Y')
          FILE="journal/day-${DAY_NUMBER}.md"
          
          echo "# День ${DAY_NUMBER} — ${DATE}" > "${FILE}"
          echo "" >> "${FILE}"
          echo "## Что сделал" >> "${FILE}"
          echo "" >> "${FILE}"
          echo "" >> "${FILE}"
          echo "## Что узнал" >> "${FILE}"
          echo "" >> "${FILE}"
          echo "" >> "${FILE}"
          echo "## Проблемы" >> "${FILE}"
          echo "" >> "${FILE}"
          echo "" >> "${FILE}"
          echo "## Код" >> "${FILE}"
          echo "code/day${DAY_NUMBER}.py" >> "${FILE}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add journal/
          git diff --cached --quiet || git commit -m "Auto create daily journal"
          git push
